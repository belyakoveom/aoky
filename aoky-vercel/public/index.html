/* ══ API Layer ══ */
var TOKEN_KEY = "aoky_token";
function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }

async function api(path, opts) {
  var token = getToken();
  var headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;
  var res = await fetch("/api" + path, { ...opts, headers: headers });
  var data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

}

          {projectsWithHistory.length>0&&<button style={{...S.addBtn,background:"#ededed"}} onClick={function(){setHistBulk(!histBulk);setHistSel([]);}}>{histBulk?<CloseIcon />:<TrashIcon />}</button>}
        </div>
        <div style={S.list}>
          {!projectsWithHistory.length&&<div style={{textAlign:"center",padding:40,opacity:0.3}}>Нет записей</div>}
          {projectsWithHistory.map(function(p,i){
            var ps=data.sessions.filter(function(s){return s.projectId===p.id;});
            var totalSec=ps.reduce(function(a,s){return a+s.duration;},0);
            if (histBulk) {
              var on=histSel.indexOf(p.id)>=0;
              return <div key={p.id} style={{...S.row,cursor:"pointer",background:on?"#e0e0e0":"#ededed",display:"flex",alignItems:"center",justifyContent:"space-between"}} onClick={function(){setHistSel(function(prev){return on?prev.filter(function(x){return x!==p.id;}):prev.concat([p.id]);});}}>
                <div><div style={S.name}>{p.name}</div><div style={S.sub}>{fmt(totalSec)}{data.showEarnings?" ("+money(totalSec,data.rate)+"р)":""}</div></div>
                <div style={{width:24,height:24,borderRadius:7,border:on?"none":"2px solid #ccc",background:on?"#000":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{on&&<CheckW />}</div>
              </div>;
            }
            var expanded=expandedHistory===p.id;
            return <div key={p.id} style={{animation:"fadeIn 0.3s ease "+(i*0.05)+"s both"}}>
              <div style={S.row}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={function(){setExpandedHistory(expanded?null:p.id);}}>
                  <div><div style={S.name}>{p.name}</div><div style={S.sub}>Всего: {fmt(totalSec)}{data.showEarnings?" ("+money(totalSec,data.rate)+"р)":""}</div></div>
                  <div style={S.ctrls}><button style={{...S.iBtn,background:"#000"}} onClick={function(e){e.stopPropagation();startTimer(p.id);setFilterClient(p.clientId);setExpandedProject(p.id);}}><PlayIcon /></button><ChevronIcon dir={expanded?"up":"down"} /></div>
                </div>
                <div style={S.expand(expanded)}><div style={S.divider} />
                  {ps.slice().sort(function(a,b){return (b.timestamp||0)-(a.timestamp||0);}).slice(0,10).map(function(se){return <div key={se.id} style={{display:"flex",justifyContent:"space-between",fontSize:17,fontWeight:500,opacity:0.55}}><span>{se.date}</span><div style={{display:"flex",gap:16}}><span>{fmt(se.duration)}</span>{data.showEarnings&&<span>{money(se.duration,data.rate)}р</span>}</div></div>;})}
                </div>
              </div>
            </div>;
          })}
        </div>
        {histBulk&&histSel.length>0&&<div style={{display:"flex",gap:6,marginTop:10,flexShrink:0}}>
          <button style={{...S.secondaryBtn,padding:"10px 0",fontSize:13,borderRadius:14,flex:1}} onClick={function(){bulkArchive(histSel);setHistSel([]);setHistBulk(false);}}>Архив ({histSel.length})</button>
          <button style={{...S.primaryBtn,padding:"10px 0",fontSize:13,borderRadius:14,flex:1,background:"#e53935"}} onClick={function(){bulkDelete(histSel);setHistSel([]);setHistBulk(false);}}>Удалить ({histSel.length})</button>
        </div>}
      </div>
    </main>

    {/* Modals */}
    {showSettings&&<div style={S.overlay} onClick={function(){setShowSettings(false);}}><div style={{...S.modal,width:480}} onClick={function(e){e.stopPropagation();}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:28}}><h3 style={{fontSize:24,fontWeight:900,fontStyle:"italic"}}>Настройки</h3><button onClick={function(){setShowSettings(false);}} style={{background:"none",border:"none",cursor:"pointer"}}><CloseIcon /></button></div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:"1px solid #eee"}}><span>Ставка (р/час)</span><input style={{width:120,padding:"10px 14px",border:"1.5px solid #ddd",borderRadius:12,fontSize:16,fontFamily:"inherit",outline:"none",textAlign:"right"}} type="number" defaultValue={data.rate} onBlur={function(e){var v=parseInt(e.target.value);if(v>0)updateSettings({rate:v});}} /></div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:"1px solid #eee"}}><span>Налог (%)</span><input style={{width:120,padding:"10px 14px",border:"1.5px solid #ddd",borderRadius:12,fontSize:16,fontFamily:"inherit",outline:"none",textAlign:"right"}} type="number" defaultValue={data.taxPercent} onBlur={function(e){var v=parseFloat(e.target.value);if(v>=0)updateSettings({taxPercent:v});}} /></div>
    </div></div>}
    {showAddProject&&<div style={S.overlay} onClick={function(){setShowAddProject(false);}}><div style={S.modal} onClick={function(e){e.stopPropagation();}}>
      <h3 style={{fontSize:22,fontWeight:700,marginBottom:24}}>Новый проект</h3>
      <input id="new-proj-name" style={{...S.input,marginBottom:16}} placeholder="Название" autoFocus />
      <button style={S.primaryBtn} onClick={function(){var n=document.getElementById("new-proj-name").value.trim();if(n){addProject({id:uid(),name:n,clientId:selectedClient||data.clients[0]?.id});setShowAddProject(false);}}}>Создать</button>
    </div></div>}
    {addTimePid&&<div style={S.overlay} onClick={function(){setAddTimePid(null);}}><div style={S.modal} onClick={function(e){e.stopPropagation();}}>
      <h3 style={{fontSize:22,fontWeight:700,marginBottom:24}}>Добавить время</h3>
      <div style={{display:"flex",gap:12,marginBottom:24}}>
        <div style={{flex:1}}><label style={{fontSize:13,opacity:0.6,display:"block",marginBottom:6}}>Часы</label><input id="add-h" style={S.input} type="number" min="0" /></div>
        <div style={{flex:1}}><label style={{fontSize:13,opacity:0.6,display:"block",marginBottom:6}}>Минуты</label><input id="add-m" style={S.input} type="number" min="0" max="59" /></div>
      </div>
      <button style={S.primaryBtn} onClick={function(){var s=(parseInt(document.getElementById("add-h").value)||0)*3600+(parseInt(document.getElementById("add-m").value)||0)*60;if(s>0){saveSession(addTimePid,s);setAddTimePid(null);}}}>Добавить</button>
    </div></div>}
    {showAddClient&&<div style={S.overlay} onClick={function(){setShowAddClient(false);}}><div style={S.modal} onClick={function(e){e.stopPropagation();}}>
      <h3 style={{fontSize:22,fontWeight:700,marginBottom:24}}>Новый клиент</h3>
      <input id="new-client-name" style={{...S.input,marginBottom:24}} placeholder="Имя клиента" autoFocus />
      <button style={S.primaryBtn} onClick={function(){var n=document.getElementById("new-client-name").value.trim();if(n){var cl={id:uid(),name:n};addClient(cl);setSelectedClient(cl.id);setShowAddClient(false);}}}>Создать</button>
    </div></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
